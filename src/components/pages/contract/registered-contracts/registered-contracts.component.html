<section class="pb-10">
  <h3 i18n class="text-3xl text-center mb-10">العقود المسجلة</h3>
  @if (registeredContracts.length !== 0) {
  <div id="table-wrapper">
    <table>
      <thead>
        <tr>
          <th i18n>رقم العقد</th>
          <th i18n>قيمة العقد</th>
          <th i18n>تحميل نسخة PDF</th>
          <th i18n>تجديد العقد</th>
        </tr>
      </thead>
      <tbody>
        @for (contract of registeredContracts; track $index) {
        <tr>
          <td>{{ contract.contract_number }}</td>
          <td i18n>{{ contract.total_price }} ريال سعودي</td>
          <td>
            <button (click)="generateContract(contract.id)">
              <img
                src="assets/images/download.png"
                alt="Download"
                width="15"
                height="15"
              />
            </button>
          </td>
          <td>
            <button i18n (click)="renewContract(contract.id)">
              تجديد العقد
            </button>
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
  } @else {
  <div>
    <h3 i18n class="text-xl text-center">لا توجد عقود مسجلة</h3>
    <div class="flex justify-center my-10">
      <img src="assets/images/unlike.png" alt="Unlike" />
    </div>
    <div class="flex justify-center">
      <div class="w-fit" (click)="createNewContract()">
        <app-green-button i18n-text text="انشاء عقد جديد"></app-green-button>
      </div>
    </div>
  </div>
  }

  <app-contract-pdf [data]="currentData" />
</section>
